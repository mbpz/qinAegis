# =============================================================================
# qinAegis CI Integration Example
#
# This workflow demonstrates how to integrate qinAegis quality gates
# into your CI/CD pipeline.
#
# Usage:
#   1. Copy this file to your project's .github/workflows/
#   2. Configure the QINAEGIS_PROJECT environment variable
#   3. Ensure MIDSCENE_MODEL_* secrets are set in your repository
# =============================================================================

name: qinAegis Quality Gate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday 2AM — no binary needed for schedule
  pull_request:

env:
  # Project name in qinAegis (must match --project flag)
  QINAEGIS_PROJECT: ${{ vars.QINAEGIS_PROJECT || 'my-webapp' }}
  # Threshold: minimum E2E pass rate (%)
  E2E_THRESHOLD: 95
  # Threshold: minimum performance score
  PERF_THRESHOLD: 80
  # Threshold: minimum RPS for stress test
  STRESS_RPS_MIN: 100
  # Threshold: maximum P95 latency (ms)
  STRESS_P95_MAX: 2000
  # Threshold: maximum error rate (%)
  STRESS_ERROR_MAX: 5

jobs:
  # ===========================================================================
  # Job 1: E2E Tests
  # ===========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/repos/mbpz/qinAegis/releases/latest" | jq -r '.tag_name')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-apple-darwin.tar.gz" | tar xz

      - name: Configure LLM
        env:
          MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}
          MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
          MIDSCENE_MODEL_NAME: ${{ secrets.MIDSCENE_MODEL_NAME || 'MiniMax-VL-01' }}
          MIDSCENE_MODEL_FAMILY: openai
        run: |
          export MIDSCENE_MODEL_BASE_URL="$MIDSCENE_MODEL_BASE_URL"
          export MIDSCENE_MODEL_API_KEY="$MIDSCENE_MODEL_API_KEY"
          export MIDSCENE_MODEL_NAME="$MIDSCENE_MODEL_NAME"
          export MIDSCENE_MODEL_FAMILY="$MIDSCENE_MODEL_FAMILY"

      - name: Run E2E Tests
        run: |
          ./qinAegis run --project "$QINAEGIS_PROJECT" --test-type smoke --concurrency 4
        continue-on-error: true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_id }}
          path: |
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/reports/**/*

  # ===========================================================================
  # Job 2: Performance Tests
  # ===========================================================================
  performance:
    name: Performance Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/repos/mbpz/qinAegis/releases/latest" | jq -r '.tag_name')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-apple-darwin.tar.gz" | tar xz

      - name: Configure LLM
        env:
          MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}
          MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
        run: |
          export MIDSCENE_MODEL_BASE_URL="$MIDSCENE_MODEL_BASE_URL"
          export MIDSCENE_MODEL_API_KEY="$MIDSCENE_MODEL_API_KEY"

      - name: Run Performance Test
        run: |
          ./qinAegis performance --url https://your-app-url.com --threshold $PERF_THRESHOLD

      - name: Upload Performance Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ github.run_id }}
          path: |
            ~/.qinAegis/reports/**/*

  # ===========================================================================
  # Job 3: Stress Tests
  # ===========================================================================
  stress-test:
    name: Stress Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/repos/mbpz/qinAegis/releases/latest" | jq -r '.tag_name')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-apple-darwin.tar.gz" | tar xz

      - name: Configure LLM
        env:
          MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}
          MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
        run: |
          export MIDSCENE_MODEL_BASE_URL="$MIDSCENE_MODEL_BASE_URL"
          export MIDSCENE_MODEL_API_KEY="$MIDSCENE_MODEL_API_KEY"

      - name: Run Stress Test
        run: |
          ./qinAegis stress \
            --target https://your-app-url.com \
            --users 100 \
            --spawn-rate 10 \
            --duration 60

      - name: Upload Stress Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-results-${{ github.run_id }}
          path: |
            ~/.qinAegis/reports/**/*

  # ===========================================================================
  # Job 4: Quality Gate
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    needs: [e2e-tests, performance, stress-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(curl -s -H "Accept: application/vnd.github+json" "https://api.github.com/repos/mbpz/qinAegis/releases/latest" | jq -r '.tag_name')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-apple-darwin.tar.gz" | tar xz

      - name: Configure LLM
        env:
          MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}
          MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
        run: |
          export MIDSCENE_MODEL_BASE_URL="$MIDSCENE_MODEL_BASE_URL"
          export MIDSCENE_MODEL_API_KEY="$MIDSCENE_MODEL_API_KEY"

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: |
            e2e-results-*
            performance-results-*
            stress-results-*

      - name: Run Quality Gate
        id: gate
        run: |
          # Get the latest run_id from results
          RUN_ID=$(ls -td results/e2e-results-* | head -1 | sed 's/.*e2e-results-//')

          ./qinAegis gate \
            --project "$QINAEGIS_PROJECT" \
            --run-id "$RUN_ID" \
            --e2e-threshold $E2E_THRESHOLD \
            --perf-threshold $PERF_THRESHOLD \
            --stress-rps-min $STRESS_RPS_MIN \
            --stress-p95-max $STRESS_P95_MAX \
            --stress-error-max $STRESS_ERROR_MAX \
            --output-json \
            --verbose

      - name: Parse Gate Result
        if: always()
        run: |
          # Gate exits with code 0 if passed, non-zero if failed
          # JSON output is in gate-result.json
          if [ -f gate-result.json ]; then
            echo "Gate Result:"
            cat gate-result.json
          fi

      - name: Upload Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-report-${{ github.run_id }}
          path: |
            gate-result.json
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/reports/**/*

# =============================================================================
# Example: Secrets to Configure
# =============================================================================
# In your GitHub repository, set these secrets:
#
#   MIDSCENE_MODEL_BASE_URL   - e.g., https://api.minimax.chat/v1
#   MIDSCENE_MODEL_API_KEY    - Your API key
#   MIDSCENE_MODEL_NAME       - e.g., MiniMax-VL-01
#
# And optionally set a repository variable:
#   QINAEGIS_PROJECT          - Your project name in qinAegis
# =============================================================================
