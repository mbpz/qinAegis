name: Publish Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.7.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            echo "error: no version found"
            exit 1
          fi
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

      - name: Download DMGs
        id: download
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i: Downloading DMGs for v${VERSION}..."
            if curl -fsSL \
              "https://github.com/mbpz/qinAegis/releases/download/v${VERSION}/QinAegis-v${VERSION}-mac-arm64.dmg" \
              -o /tmp/arm64.dmg \
              && curl -fsSL \
              "https://github.com/mbpz/qinAegis/releases/download/v${VERSION}/QinAegis-v${VERSION}-mac-x64.dmg" \
              -o /tmp/x64.dmg; then
              echo "Download successful"
              break
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Download failed, retrying in ${RETRY_DELAY}s..."
              sleep "$RETRY_DELAY"
              RETRY_DELAY=$((RETRY_DELAY * 2))
            else
              echo "All retries exhausted"
              exit 1
            fi
          done
          ARM_SHA=$(shasum -a 256 /tmp/arm64.dmg | awk '{print $1}')
          X64_SHA=$(shasum -a 256 /tmp/x64.dmg | awk '{print $1}')
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "x64_sha=${X64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create cask file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM_SHA="${{ steps.download.outputs.arm_sha }}"
          X64_SHA="${{ steps.download.outputs.x64_sha }}"
          mkdir -p Casks
          cat > Casks/qinaegis.rb <<RUBY
cask "qinaegis" do
  arch arm: "arm64", intel: "x64"

  version "${VERSION}"
  sha256 arm:   "${ARM_SHA}",
         intel: "${X64_SHA}"

  url "https://github.com/mbpz/qinAegis/releases/download/v\#{version}/QinAegis-v\#{version}-mac-\#{arch}.dmg"
  name "QinAegis"
  desc "AI-powered quality engineering platform for Web applications"
  homepage "https://github.com/mbpz/qinAegis"

  livecheck do
    url :url
    strategy :github_latest
  end

  auto_updates true
  depends_on macos: ">= :catalina"

  artifact "QinAegis.app", target: "/Applications/QinAegis.app"

  uninstall quit: "com.qinaegis.app",
            delete: "/Applications/QinAegis.app"

  zap trash: [
    "~/.qinAegis",
    "~/Library/Application Support/com.qinaegis.app",
    "~/Library/Preferences/com.qinaegis.app.plist",
    "~/Library/Saved Application State/com.qinaegis.app.savedState",
  ]

  caveats <<~EOS
    After installation, find QinAegis in your Applications folder.
    Double-click to launch the GUI application.
  EOS
end
RUBY
          echo "Generated Casks/qinaegis.rb:"
          cat Casks/qinaegis.rb

      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/mbpz/homebrew-qinAegis.git tap-repo
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp ../Casks/qinaegis.rb Casks/qinaegis.rb
          git add Casks/qinaegis.rb
          git commit -m "qinaegis ${{ steps.version.outputs.version }}"
          git push
