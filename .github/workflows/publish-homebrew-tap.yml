name: Publish Homebrew Tap

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download ARM64 DMG
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/v${VERSION}/qinAegis-arm64.dmg" -o /tmp/arm64.dmg
          ARM_SHA=$(shasum -a 256 /tmp/arm64.dmg | awk '{print $1}')
          echo "arm_sha=$ARM_SHA" >> $GITHUB_OUTPUT

      - name: Download x64 DMG
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/v${VERSION}/qinAegis-x64.dmg" -o /tmp/x64.dmg
          X64_SHA=$(shasum -a 256 /tmp/x64.dmg | awk '{print $1}')
          echo "x64_sha=$X64_SHA" >> $GITHUB_OUTPUT

      - name: Create cask with real SHA256
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          ARM_SHA="${{ steps.release.outputs.arm_sha }}"
          X64_SHA="${{ steps.release.outputs.x64_sha }}"

          mkdir -p Formula

          printf 'cask "qinaegis" do\n  arch arm: "arm64", intel: "x64"\n\n  version "%s"\n  sha256 arm:   "%s",\n         intel: "%s"\n\n  url "https://github.com/mbpz/qinAegis/releases/download/v%s/qinAegis-%s.dmg"\n  name "QinAegis"\n  desc "AI-powered terminal productivity tool"\n  homepage "https://github.com/mbpz/qinAegis"\n\n  livecheck do\n    url :url\n    strategy :github_latest\n  end\n\n  auto_updates false\n  depends_on macos: ">= :catalina"\n\n  app "QinAegis.app"\n\n  zap trash: [\n    "~/Library/Application Support/com.qinaegis.qinAegis",\n    "~/Library/Preferences/com.qinaegis.qinAegis.plist",\n    "~/Library/Saved Application State/com.qinaegis.qinAegis.savedState",\n  ]\nend\n' "$VERSION" "$ARM_SHA" "$X64_SHA" "$VERSION" "$VERSION" > Formula/qinaegis.rb

      - name: Push to release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout release-cask 2>/dev/null || git checkout -b release-cask

          mkdir -p Formula
          cp Formula/qinaegis.rb Formula/qinaegis.rb.bak 2>/dev/null || true

          VERSION="${{ steps.release.outputs.version }}"
          ARM_SHA="${{ steps.release.outputs.arm_sha }}"
          X64_SHA="${{ steps.release.outputs.x64_sha }}"

          printf 'cask "qinaegis" do\n  arch arm: "arm64", intel: "x64"\n\n  version "%s"\n  sha256 arm:   "%s",\n         intel: "%s"\n\n  url "https://github.com/mbpz/qinAegis/releases/download/v%s/qinAegis-%s.dmg"\n  name "QinAegis"\n  desc "AI-powered terminal productivity tool"\n  homepage "https://github.com/mbpz/qinAegis"\n\n  livecheck do\n    url :url\n    strategy :github_latest\n  end\n\n  auto_updates false\n  depends_on macos: ">= :catalina"\n\n  app "QinAegis.app"\n\n  zap trash: [\n    "~/Library/Application Support/com.qinaegis.qinAegis",\n    "~/Library/Preferences/com.qinaegis.qinAegis.plist",\n    "~/Library/Saved Application State/com.qinaegis.qinAegis.savedState",\n  ]\nend\n' "$VERSION" "$ARM_SHA" "$X64_SHA" "$VERSION" "$VERSION" > Formula/qinaegis.rb

          git add Formula/qinaegis.rb
          git commit -m "qinaegis $VERSION"
          git push -f origin release-cask