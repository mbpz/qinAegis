name: Publish Homebrew Tap

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: mbpz/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download DMGs and create cask
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"

          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/QinAegis-${VERSION}-mac-arm64.dmg" -o /tmp/arm64.dmg
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/QinAegis-${VERSION}-mac-x64.dmg" -o /tmp/x64.dmg

          ARM_SHA=$(shasum -a 256 /tmp/arm64.dmg | awk '{print $1}')
          X64_SHA=$(shasum -a 256 /tmp/x64.dmg | awk '{print $1}')

          mkdir -p homebrew-tap/Casks

          cat > homebrew-tap/Casks/qinaegis.rb << EOF
cask "qinaegis" do
  arch arm: "arm64", intel: "x64"

  version "${VERSION}"
  sha256 arm:   "${ARM_SHA}",
         intel: "${X64_SHA}"

  url "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/QinAegis-${VERSION}-mac-#{arch}.dmg"
  name "QinAegis"
  desc "AI-powered terminal productivity tool"
  homepage "https://github.com/mbpz/qinAegis"

  livecheck do
    url :url
    strategy :github_latest
  end

  auto_updates false
  depends_on macos: ">= :catalina"

  artifact "QinAegis.app", target: "/Applications/QinAegis.app"

  uninstall quit: "com.qinaegis.qinAegis",
            delete: "/Applications/QinAegis.app"

  zap trash: [
    "~/Library/Application Support/com.qinaegis.qinAegis",
    "~/Library/Preferences/com.qinaegis.qinAegis.plist",
    "~/Library/Saved Application State/com.qinaegis.qinAegis.savedState",
  ]
end
EOF

      - name: Push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/qinaegis.rb
          git diff --staged --quiet || git commit -m "qinaegis ${GITHUB_REF#refs/tags/}"
          git push