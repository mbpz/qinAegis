# =============================================================================
# qinAegis Complete Orchestration Pipeline
#
# This workflow chains the entire testing pipeline from URL input through
# quality gate: explore → generate → review → run (smoke/functional/performance/stress)
#
# Usage:
#   1. Copy to .github/workflows/qinAegis-full-pipeline.yml
#   2. Set QINAEGIS_PROJECT and TARGET_URL variables
#   3. Configure MIDSCENE_MODEL_* secrets
# =============================================================================

name: qinAegis Full Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: Target URL to test
        required: true
        type: string
        default: "https://your-app.com"
      project_name:
        description: Project name in qinAegis
        required: true
        type: string
        default: "my-webapp"
      max_explore_depth:
        description: Maximum exploration depth
        required: false
        type: number
        default: 3

env:
  QINAEGIS_PROJECT: ${{ inputs.project_name || vars.QINAEGIS_PROJECT || 'my-webapp' }}
  TARGET_URL: ${{ inputs.target_url || vars.TARGET_URL || 'https://your-app.com' }}
  MAX_EXPLORE_DEPTH: ${{ inputs.max_explore_depth || 3 }}

  # Quality Gate Thresholds
  E2E_PASS_RATE_MIN: 95
  PERFORMANCE_SCORE_MIN: 80
  STRESS_RPS_MIN: 100
  STRESS_P95_MAX_MS: 2000
  STRESS_ERROR_RATE_MAX: 5

  # LLM Configuration (set via secrets)
  MIDSCENE_MODEL_BASE_URL: ${{ secrets.MIDSCENE_MODEL_BASE_URL }}
  MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
  MIDSCENE_MODEL_NAME: ${{ secrets.MIDSCENE_MODEL_NAME || 'MiniMax-VL-01' }}
  MIDSCENE_MODEL_FAMILY: openai

jobs:
  # ===========================================================================
  # Stage 1: Explore - AI-powered project discovery
  # ===========================================================================
  explore:
    name: Explore Project
    runs-on: ubuntu-latest
    outputs:
      pages_found: ${{ steps.explore.outputs.pages_count }}
      spec_path: ${{ steps.explore.outputs.spec_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Run Project Exploration
        id: explore
        run: |
          echo "Exploring $TARGET_URL with depth $MAX_EXPLORE_DEPTH..."

          # Create project if needed
          ./qinAegis project add \
            --name "$QINAEGIS_PROJECT" \
            --url "$TARGET_URL" \
            2>/dev/null || echo "Project may already exist"

          # Run exploration
          EXPLORE_OUTPUT=$(./qinAegis explore \
            --project "$QINAEGIS_PROJECT" \
            --seed-url "$TARGET_URL" \
            --max-depth $MAX_EXPLORE_DEPTH 2>&1)

          echo "$EXPLORE_OUTPUT"

          # Extract pages count from output
          PAGES=$(echo "$EXPLORE_OUTPUT" | grep -oP '\d+(?= pages)' || echo "0")
          echo "pages_count=$PAGES" >> $GITHUB_OUTPUT

          # Get spec path
          SPEC_PATH=$(echo "$EXPLORE_OUTPUT" | grep -oP '(?<=Spec saved to: ).+' || echo "")
          echo "spec_path=$SPEC_PATH" >> $GITHUB_OUTPUT

      - name: Upload Exploration Spec
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exploration-spec-${{ github.run_id }}
          path: ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/spec/
          retention-days: 30

  # ===========================================================================
  # Stage 2: Generate - AI-powered test case generation
  # ===========================================================================
  generate:
    name: Generate Test Cases
    runs-on: ubuntu-latest
    needs: [explore]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Generate Test Cases
        run: |
          echo "Generating test cases for $QINAEGIS_PROJECT..."

          # Get spec path
          SPEC_PATH=$(ls ~/.qinAegis/projects/$QINAEGIS_PROJECT/spec/*.md 2>/dev/null | head -1 || echo "")

          if [ -z "$SPEC_PATH" ]; then
            echo "No spec found, skipping generate step"
            exit 0
          fi

          # Generate test cases from spec
          ./qinAegis generate \
            --project "$QINAEGIS_PROJECT" \
            --spec-path "$SPEC_PATH" \
            --requirement "Full coverage" \
            2>&1 || echo "Generate may need manual review"

      - name: Count Generated Cases
        id: count_cases
        run: |
          DRAFT_COUNT=$(find ~/.qinAegis/projects/$QINAEGIS_PROJECT/cases/draft -name "*.json" 2>/dev/null | wc -l || echo "0")
          echo "draft_cases=$DRAFT_COUNT" >> $GITHUB_OUTPUT
          echo "Found $DRAFT_COUNT draft test cases"

      - name: Upload Generated Cases
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-cases-${{ github.run_id }}
          path: ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/cases/
          retention-days: 30

  # ===========================================================================
  # Stage 3: Review - Human/AI review of test cases
  # ===========================================================================
  review:
    name: Review Test Cases
    runs-on: ubuntu-latest
    needs: [generate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Run Test Case Review
        run: |
          echo "Reviewing test cases for $QINAEGIS_PROJECT..."

          # Run review command (this would move cases from draft to reviewed)
          ./qinAegis review --project "$QINAEGIS_PROJECT" 2>&1 || echo "Review completed"

          # Count cases by status
          echo "=== Test Case Status ==="
          echo "Draft: $(find ~/.qinAegis/projects/$QINAEGIS_PROJECT/cases/draft -name "*.json" 2>/dev/null | wc -l)"
          echo "Reviewed: $(find ~/.qinAegis/projects/$QINAEGIS_PROJECT/cases/reviewed -name "*.json" 2>/dev/null | wc -l)"
          echo "Approved: $(find ~/.qinAegis/projects/$QINAEGIS_PROJECT/cases/approved -name "*.json" 2>/dev/null | wc -l)"

      - name: Upload Review Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-report-${{ github.run_id }}
          path: ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/cases/
          retention-days: 30

  # ===========================================================================
  # Stage 4a: Run E2E Tests (Smoke)
  # ===========================================================================
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Run E2E Smoke Tests
        id: e2e
        run: |
          echo "Running E2E smoke tests for $QINAEGIS_PROJECT..."
          echo "Target URL: $TARGET_URL"

          RESULT=$(./qinAegis run \
            --project "$QINAEGIS_PROJECT" \
            --test-type smoke \
            --concurrency 4 \
            2>&1)
          echo "$RESULT"

          # Extract pass rate
          PASS_RATE=$(echo "$RESULT" | grep -oP '\d+(?=% pass rate)' || echo "0")
          echo "e2e_pass_rate=$PASS_RATE" >> $GITHUB_OUTPUT
          echo "e2e_pass_rate=$PASS_RATE"

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results-${{ github.run_id }}
          path: |
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/runs/
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/cases/
          retention-days: 30

  # ===========================================================================
  # Stage 4b: Performance Tests
  # ===========================================================================
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Run Performance Tests
        id: perf
        run: |
          echo "Running performance tests for $TARGET_URL..."

          # Load baseline if exists
          BASELINE_ARG=""
          if [ -f ~/.qinAegis/projects/$QINAEGIS_PROJECT/knowledge/baseline-lighthouse.json ]; then
            BASELINE_ARG="--baseline ~/.qinAegis/projects/$QINAEGIS_PROJECT/knowledge/baseline-lighthouse.json"
          fi

          RESULT=$(./qinAegis performance \
            --url "$TARGET_URL" \
            --threshold $PERFORMANCE_SCORE_MIN \
            $BASELINE_ARG \
            2>&1)
          echo "$RESULT"

          # Extract performance score
          PERF_SCORE=$(echo "$RESULT" | grep -oP '\d+(?= performance score)' || echo "0")
          echo "perf_score=$PERF_SCORE" >> $GITHUB_OUTPUT
          echo "perf_score=$PERF_SCORE"

      - name: Save Baseline
        if: success()
        run: |
          # Save as baseline for future runs
          cp ~/.qinAegis/reports/latest/lighthouse.json \
             ~/.qinAegis/projects/$QINAEGIS_PROJECT/knowledge/baseline-lighthouse.json 2>/dev/null || true

      - name: Upload Performance Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ github.run_id }}
          path: |
            ~/.qinAegis/reports/
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/knowledge/
          retention-days: 30

  # ===========================================================================
  # Stage 4c: Stress Tests
  # ===========================================================================
  stress-test:
    name: Stress Tests
    runs-on: ubuntu-latest
    needs: [review]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Install k6
        run: |
          sudo gdebi --n ./k6*.deb 2>/dev/null || \
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz | tar xz --strip-components=1 -C /usr/local/bin

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Run Stress Tests
        id: stress
        run: |
          echo "Running stress tests for $TARGET_URL..."

          RESULT=$(./qinAegis stress \
            --target "$TARGET_URL" \
            --users 100 \
            --spawn-rate 10 \
            --duration 60 \
            2>&1)
          echo "$RESULT"

          # Extract key metrics
          RPS=$(echo "$RESULT" | grep -oP '\d+(?= RPS)' || echo "0")
          P95=$(echo "$RESULT" | grep -oP '\d+(?=ms p95)' || echo "0")
          ERROR_RATE=$(echo "$RESULT" | grep -oP '\d+(?=% error)' || echo "0")

          echo "stress_rps=$RPS" >> $GITHUB_OUTPUT
          echo "stress_p95=$P95" >> $GITHUB_OUTPUT
          echo "stress_error_rate=$ERROR_RATE" >> $GITHUB_OUTPUT

          echo "RPS: $RPS, P95: ${P95}ms, Error Rate: ${ERROR_RATE}%"

      - name: Upload Stress Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-results-${{ github.run_id }}
          path: ~/.qinAegis/reports/
          retention-days: 30

  # ===========================================================================
  # Stage 5: Quality Gate - Orchestrated gate check
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [e2e-smoke, performance, stress-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install qinAegis
        run: |
          VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
          curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz

      - name: Configure LLM
        run: |
          echo "MIDSCENE_MODEL_BASE_URL=${{ env.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_API_KEY=${{ env.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_NAME=${{ env.MIDSCENE_MODEL_NAME }}" >> $GITHUB_ENV
          echo "MIDSCENE_MODEL_FAMILY=${{ env.MIDSCENE_MODEL_FAMILY }}" >> $GITHUB_ENV

      - name: Download All Test Results
        uses: actions/download-artifact@v4
        with:
          path: results
          pattern: |
            e2e-smoke-results-*
            performance-results-*
            stress-results-*
            review-report-*
            generated-cases-*
            exploration-spec-*

      - name: Merge Results
        run: |
          echo "=== Merging test results ==="
          mkdir -p ~/.qinAegis/projects/$QINAEGIS_PROJECT/
          mkdir -p ~/.qinAegis/reports/

          # Copy all results to appropriate locations
          for dir in results/*/; do
            [ -d "$dir" ] || continue
            basename=$(basename "$dir")
            case "$basename" in
              e2e-smoke-*)
                cp -r "$dir"runs/* ~/.qinAegis/projects/$QINAEGIS_PROJECT/runs/ 2>/dev/null || true
                ;;
              performance-*)
                cp -r "$dir"reports/* ~/.qinAegis/reports/ 2>/dev/null || true
                ;;
              stress-*)
                cp -r "$dir"reports/* ~/.qinAegis/reports/ 2>/dev/null || true
                ;;
            esac
          done

      - name: Run Quality Gate
        id: gate
        run: |
          echo "=== Running Quality Gate ==="
          echo "Project: $QINAEGIS_PROJECT"
          echo "Thresholds:"
          echo "  E2E Pass Rate: >= $E2E_PASS_RATE_MIN%"
          echo "  Performance Score: >= $PERFORMANCE_SCORE_MIN"
          echo "  Stress RPS: >= $STRESS_RPS_MIN"
          echo "  Stress P95: <= ${STRESS_P95_MAX_MS}ms"
          echo "  Stress Error Rate: <= ${STRESS_ERROR_RATE_MAX}%"

          # Run gate check with all thresholds
          GATE_OUTPUT=$(./qinAegis gate \
            --project "$QINAEGIS_PROJECT" \
            --e2e-threshold $E2E_PASS_RATE_MIN \
            --perf-threshold $PERFORMANCE_SCORE_MIN \
            --stress-rps-min $STRESS_RPS_MIN \
            --stress-p95-max $STRESS_P95_MAX_MS \
            --stress-error-max $STRESS_ERROR_RATE_MAX \
            --output-json \
            2>&1)
          echo "$GATE_OUTPUT"

          # Save gate result
          echo "$GATE_OUTPUT" > gate-result.json

      - name: Parse Gate Result
        if: always()
        run: |
          if [ -f gate-result.json ]; then
            echo "=== Quality Gate Result ==="
            cat gate-result.json

            # Check exit code from JSON
            EXIT_CODE=$(cat gate-result.json | grep -oP '"exit_code":\s*\K\d+' || echo "0")
            echo "Gate exit code: $EXIT_CODE"

            if [ "$EXIT_CODE" = "0" ]; then
              echo "✅ QUALITY GATE PASSED"
            else
              echo "❌ QUALITY GATE FAILED"
              exit 1
            fi
          fi

      - name: Upload Gate Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-report-${{ github.run_id }}
          path: |
            gate-result.json
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/runs/
            ~/.qinAegis/projects/${{ env.QINAEGIS_PROJECT }}/knowledge/
          retention-days: 90

      - name: Update Knowledge Base
        if: success()
        run: |
          echo "Updating quality knowledge base..."

          # Update coverage
          echo '{"last_run":"${{ github.run_id }}","coverage":$(find ~/.qinAegis/projects/$QINAEGIS_PROJECT/cases/approved -name "*.json" | wc -l)}' > \
            ~/.qinAegis/projects/$QINAEGIS_PROJECT/knowledge/coverage.json

  # ===========================================================================
  # Stage 6: Summary Report
  # ===========================================================================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "=== qinAegis Pipeline Summary ==="
          echo "Run ID: ${{ github.run_id }}"
          echo "Project: $QINAEGIS_PROJECT"
          echo "Target URL: $TARGET_URL"
          echo ""
          echo "Pipeline Status: ${{ needs.quality-gate.result }}"
          echo ""
          echo "Stages:"
          echo "  1. Explore: ${{ needs.explore.result }}"
          echo "  2. Generate: ${{ needs.generate.result }}"
          echo "  3. Review: ${{ needs.review.result }}"
          echo "  4. Tests:"
          echo "     - E2E Smoke: ${{ needs.e2e-smoke.result }}"
          echo "     - Performance: ${{ needs.performance.result }}"
          echo "     - Stress: ${{ needs.stress-test.result }}"
          echo "  5. Quality Gate: ${{ needs.quality-gate.result }}"
          echo ""

          if [ "${{ needs.quality-gate.result }}" = "success" ]; then
            echo "🎉 All quality gates passed! Ready for deployment."
          else
            echo "⚠️ Quality gates failed. Review results before proceeding."
          fi

      - name: Create PR Comment
        if: github.event_name == 'pull_request'
        run: |
          echo "Pipeline results for PR #${{ github.event.pull_request.number }}" >> pr-comment.md
          echo "=== qinAegis Quality Gate Results ===" >> pr-comment.md
          echo "" >> pr-comment.md
          echo "| Stage | Status |" >> pr-comment.md
          echo "|-------|--------|" >> pr-comment.md
          echo "| Explore | ${{ needs.explore.result }} |" >> pr-comment.md
          echo "| Generate | ${{ needs.generate.result }} |" >> pr-comment.md
          echo "| Review | ${{ needs.review.result }} |" >> pr-comment.md
          echo "| E2E Smoke | ${{ needs.e2e-smoke.result }} |" >> pr-comment.md
          echo "| Performance | ${{ needs.performance.result }} |" >> pr-comment.md
          echo "| Stress | ${{ needs.stress-test.result }} |" >> pr-comment.md
          echo "| **Quality Gate** | **${{ needs.quality-gate.result }}** |" >> pr-comment.md
          echo "" >> pr-comment.md
          echo "Artifacts: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> pr-comment.md

          echo "PR Comment:"
          cat pr-comment.md

# =============================================================================
# Reusable Workflow Variants
# =============================================================================

# Quick smoke test only (for fast feedback)
quick-smoke:
  name: Quick Smoke Test
  run: |
    jobs:
      e2e-smoke:
        name: Quick Smoke
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Install qinAegis
            run: |
              VERSION=$(gh release list --limit 1 --exclude-drafts | awk '{print $1}')
              curl -fsSL "https://github.com/mbpz/qinAegis/releases/download/${VERSION}/qinAegis-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          - name: Configure LLM
            run: |
              echo "MIDSCENE_MODEL_BASE_URL=${{ secrets.MIDSCENE_MODEL_BASE_URL }}" >> $GITHUB_ENV
              echo "MIDSCENE_MODEL_API_KEY=${{ secrets.MIDSCENE_MODEL_API_KEY }}" >> $GITHUB_ENV
          - name: Run Smoke
            run: ./qinAegis run --project ${{ env.QINAEGIS_PROJECT }} --test-type smoke

# Nightly full pipeline
nightly-full:
  name: Nightly Full Pipeline
  run: |
    on:
      schedule:
        - cron: '0 2 * * *'  # 2 AM daily
      workflow_dispatch:

    jobs:
      explore:
        ...
      # Full pipeline as defined above

# =============================================================================
# Secrets Required
# =============================================================================
# Configure these in GitHub repository settings:
#
# Required:
#   MIDSCENE_MODEL_BASE_URL   - e.g., https://api.minimax.chat/v1
#   MIDSCENE_MODEL_API_KEY    - Your API key
#
# Optional:
#   MIDSCENE_MODEL_NAME       - e.g., MiniMax-VL-01 (default: MiniMax-VL-01)
#
# Variables:
#   QINAEGIS_PROJECT          - Project name (default: my-webapp)
#   TARGET_URL                - Target URL (default: https://your-app.com)
# =============================================================================