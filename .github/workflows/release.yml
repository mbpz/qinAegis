name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add targets
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build ARM64
        run: |
          cargo build --release --bin qinAegis-web --target aarch64-apple-darwin

      - name: Build x86
        run: |
          cargo build --release --bin qinAegis-web --target x86_64-apple-darwin

      - name: Package ARM64
        run: |
          mkdir -p release
          cp target/aarch64-apple-darwin/release/qinAegis-web release/
          tar -czf QinAegis-aarch64-apple-darwin.tar.gz -C release qinAegis-web
          cp target/aarch64-apple-darwin/release/qinAegis-web release/
          BUNDLE="QinAegis.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp target/aarch64-apple-darwin/release/qinAegis-web "$BUNDLE/Contents/MacOS/QinAegis"
          cat > "$BUNDLE/Contents/Info.plist" << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>QinAegis</string>
  <key>CFBundleIdentifier</key>
  <string>com.qinaegis.web</string>
  <key>CFBundleName</key>
  <string>QinAegis</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>CFBundleShortVersionString</key>
  <string>${{ github.ref_name }}</string>
  <key>CFBundleVersion</key>
  <string>1</string>
  <key>LSMinimumSystemVersion</key>
  <string>10.15</string>
</dict>
</plist>
PLIST
          tar -czf QinAegis-aarch64.darwin-app.tar.gz "$BUNDLE"

      - name: Package x86
        run: |
          cp target/x86_64-apple-darwin/release/qinAegis-web release/
          tar -czf QinAegis-x86_64-apple-darwin.tar.gz -C release qinAegis-web
          BUNDLE="QinAegis.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp target/x86_64-apple-darwin/release/qinAegis-web "$BUNDLE/Contents/MacOS/QinAegis"
          cat > "$BUNDLE/Contents/Info.plist" << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>QinAegis</string>
  <key>CFBundleIdentifier</key>
  <string>com.qinaegis.web</string>
  <key>CFBundleName</key>
  <string>QinAegis</string>
  <key>CFBundlePackageType</key>
  <string>APPL</string>
  <key>CFBundleShortVersionString</key>
  <string>${{ github.ref_name }}</string>
  <key>CFBundleVersion</key>
  <string>1</string>
  <key>LSMinimumSystemVersion</key>
  <string>10.15</string>
</dict>
</plist>
PLIST
          tar -czf QinAegis-x86_64.darwin-app.tar.gz "$BUNDLE"

      - name: Generate SHA256
        run: |
          echo "aarch64-apple-darwin" > sha256_aarch64.txt
          shasum -a 256 QinAegis-aarch64-apple-darwin.tar.gz | awk '{print $1}' >> sha256_aarch64.txt
          echo "x86_64-apple-darwin" > sha256_x86_64.txt
          shasum -a 256 QinAegis-x86_64-apple-darwin.tar.gz | awk '{print $1}' >> sha256_x86_64.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qinAegis-all
          path: |
            QinAegis-aarch64-apple-darwin.tar.gz
            QinAegis-x86_64-apple-darwin.tar.gz
            QinAegis-aarch64.darwin-app.tar.gz
            QinAegis-x86_64.darwin-app.tar.gz
            sha256_aarch64.txt
            sha256_x86_64.txt

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: qinAegis-all
          path: artifacts

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/QinAegis-aarch64-apple-darwin.tar.gz
            artifacts/QinAegis-x86_64-apple-darwin.tar.gz
            artifacts/QinAegis-aarch64.darwin-app.tar.gz
            artifacts/QinAegis-x86_64.darwin-app.tar.gz
            artifacts/sha256_aarch64.txt
            artifacts/sha256_x86_64.txt
          draft: true
          generate_release_notes: true