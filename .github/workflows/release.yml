name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build Release
        run: |
          cargo build --release --bin qinAegis-web --target aarch64-apple-darwin
          tar -czf qinAegis-aarch64-apple-darwin.tar.gz \
            -C target/aarch64-apple-darwin/release qinAegis-web

      - name: Generate SHA256
        run: |
          echo "aarch64-apple-darwin" > sha256_aarch64.txt
          shasum -a 256 qinAegis-aarch64-apple-darwin.tar.gz | awk '{print $1}' >> sha256_aarch64.txt

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE="QinAegis.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp target/aarch64-apple-darwin/release/qinAegis-web "$BUNDLE/Contents/MacOS/QinAegis"
          PLIST='<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>QinAegis</string><key>CFBundleIdentifier</key><string>com.qinaegis.qinAegis</string><key>CFBundleName</key><string>QinAegis</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>VERSION</string><key>CFBundleVersion</key><string>1</string><key>LSMinimumSystemVersion</key><string>10.15</string><key>LSApplicationCategoryType</key><string>public.app-category.developer-tools</string></dict></plist>'
          echo "${PLIST//VERSION/$VERSION}" > "$BUNDLE/Contents/Info.plist"
          codesign --force --deep --sign - "$BUNDLE"
          hdiutil create -volname "QinAegis-${VERSION}" -fs APFS -format UDZO qinAegis-arm64.dmg -srcfolder "$BUNDLE"
          xattr -r -d com.apple.quarantine qinAegis-arm64.dmg 2>/dev/null || true

      - name: Create macOS App Bundle
        run: |
          BUNDLE="QinAegis.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp target/aarch64-apple-darwin/release/qinAegis-web "$BUNDLE/Contents/MacOS/QinAegis"
          tar -czf QinAegis-aarch64.darwin-app.tar.gz "$BUNDLE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qinAegis-aarch64-apple-darwin
          path: |
            qinAegis-aarch64-apple-darwin.tar.gz
            QinAegis-aarch64.darwin-app.tar.gz
            qinAegis-arm64.dmg
            sha256_aarch64.txt

  build-x86:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build Release
        run: |
          cargo build --release --bin qinAegis-web --target x86_64-apple-darwin
          tar -czf qinAegis-x86_64-apple-darwin.tar.gz \
            -C target/x86_64-apple-darwin/release qinAegis-web

      - name: Generate SHA256
        run: |
          echo "x86_64-apple-darwin" > sha256_x86_64.txt
          shasum -a 256 qinAegis-x86_64-apple-darwin.tar.gz | awk '{print $1}' >> sha256_x86_64.txt

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUNDLE="QinAegis.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp target/x86_64-apple-darwin/release/qinAegis-web "$BUNDLE/Contents/MacOS/QinAegis"
          PLIST='<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>QinAegis</string><key>CFBundleIdentifier</key><string>com.qinaegis.qinAegis</string><key>CFBundleName</key><string>QinAegis</string><key>CFBundlePackageType</key><string>APPL</string><key>CFBundleShortVersionString</key><string>VERSION</string><key>CFBundleVersion</key><string>1</string><key>LSMinimumSystemVersion</key><string>10.15</string><key>LSApplicationCategoryType</key><string>public.app-category.developer-tools</string></dict></plist>'
          echo "${PLIST//VERSION/$VERSION}" > "$BUNDLE/Contents/Info.plist"
          codesign --force --deep --sign - "$BUNDLE"
          hdiutil create -volname "QinAegis-${VERSION}" -fs APFS -format UDZO qinAegis-x64.dmg -srcfolder "$BUNDLE"
          xattr -r -d com.apple.quarantine qinAegis-x64.dmg 2>/dev/null || true

      - name: Create macOS App Bundle
        run: |
          BUNDLE="QinAegis.app"
          rm -rf "$BUNDLE"
          mkdir -p "$BUNDLE/Contents/MacOS"
          cp target/x86_64-apple-darwin/release/qinAegis-web "$BUNDLE/Contents/MacOS/QinAegis"
          tar -czf QinAegis-x86_64.darwin-app.tar.gz "$BUNDLE"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qinAegis-x86_64-apple-darwin
          path: |
            qinAegis-x86_64-apple-darwin.tar.gz
            QinAegis-x86_64.darwin-app.tar.gz
            qinAegis-x64.dmg
            sha256_x86_64.txt

  create-release:
    needs: [build-arm64, build-x86]
    runs-on: ubuntu-latest
    steps:
      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: qinAegis-aarch64-apple-darwin
          path: artifacts/arm64

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: qinAegis-x86_64-apple-darwin
          path: artifacts/x86

      - name: Combine SHA256 files
        run: |
          cat artifacts/arm64/sha256_aarch64.txt artifacts/x86/sha256_x86_64.txt > sha256.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/arm64/qinAegis-aarch64-apple-darwin.tar.gz
            artifacts/arm64/QinAegis-aarch64.darwin-app.tar.gz
            artifacts/arm64/qinAegis-arm64.dmg
            artifacts/x86/qinAegis-x86_64-apple-darwin.tar.gz
            artifacts/x86/QinAegis-x86_64.darwin-app.tar.gz
            artifacts/x86/qinAegis-x64.dmg
            sha256.txt
          draft: true
          generate_release_notes: true