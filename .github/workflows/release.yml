name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build Release
        run: |
          cargo build --release --target aarch64-apple-darwin
          tar -czf qinAegis-aarch64-apple-darwin.tar.gz \
            -C target/aarch64-apple-darwin/release qinAegis

      - name: Generate SHA256
        run: |
          echo "aarch64-apple-darwin" > sha256_aarch64.txt
          shasum -a 256 qinAegis-aarch64-apple-darwin.tar.gz | awk '{print $1}' >> sha256_aarch64.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qinAegis-aarch64-apple-darwin
          path: |
            qinAegis-aarch64-apple-darwin.tar.gz
            sha256_aarch64.txt

  build-x86:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build Release
        run: |
          cargo build --release --target x86_64-apple-darwin
          tar -czf qinAegis-x86_64-apple-darwin.tar.gz \
            -C target/x86_64-apple-darwin/release qinAegis

      - name: Generate SHA256
        run: |
          echo "x86_64-apple-darwin" > sha256_x86_64.txt
          shasum -a 256 qinAegis-x86_64-apple-darwin.tar.gz | awk '{print $1}' >> sha256_x86_64.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qinAegis-x86_64-apple-darwin
          path: |
            qinAegis-x86_64-apple-darwin.tar.gz
            sha256_x86_64.txt

  create-release:
    needs: [build-arm64, build-x86]
    runs-on: ubuntu-latest
    steps:
      - name: Download ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: qinAegis-aarch64-apple-darwin
          path: artifacts/arm64

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: qinAegis-x86_64-apple-darwin
          path: artifacts/x86

      - name: Combine SHA256 files
        run: |
          cat artifacts/arm64/sha256_aarch64.txt artifacts/x86/sha256_x86_64.txt > sha256.txt

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/arm64/qinAegis-aarch64-apple-darwin.tar.gz
            artifacts/x86/qinAegis-x86_64-apple-darwin.tar.gz
            sha256.txt
          draft: true
          generate_release_notes: true