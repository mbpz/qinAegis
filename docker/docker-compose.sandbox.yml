# docker/docker-compose.sandbox.yml
version: "3.9"

services:
  steel:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sandbox
    ports:
      - "3333:3333"    # Steel REST API
      - "9222:9222"    # Chrome CDP WebSocket
    environment:
      STEEL_API_KEY: "local-dev-key"
    volumes:
      - steel-data:/data
    networks: [sandbox]

networks:
  sandbox:
    driver: bridge

volumes:
  steel-data: