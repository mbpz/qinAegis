# docker/docker-compose.sandbox.yml
services:
  steel:
    image: ghcr.io/steel-dev/steel-browser:latest
    network_mode: host
    environment:
      STEEL_API_KEY: "local-dev-key"
      # Override Chrome debug address to bind to all interfaces
      CDP_WS_URL: "ws://0.0.0.0:9222/ws"
    volumes:
      - steel-data:/data

volumes:
  steel-data: